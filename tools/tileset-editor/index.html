<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plain Tileset Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0d0d1a;
            --bg-card: #161625;
            --bg-cell: #1c1c2e;
            --bg-cell-hover: #252540;
            --bg-cell-filled: #1a2a1a;
            --border: #2a2a45;
            --border-gold: #ffd700;
            --border-gold-dim: rgba(255, 215, 0, 0.25);
            --text: #e0e0f0;
            --text-dim: #8888a8;
            --text-gold: #ffd700;
            --accent-green: #4ade80;
            --accent-blue: #60a5fa;
            --accent-red: #f87171;
            --accent-purple: #c084fc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── HEADER ── */
        .header {
            background: linear-gradient(135deg, #0f0f20 0%, #1a1a35 100%);
            border-bottom: 1px solid var(--border-gold-dim);
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-gold);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 span {
            font-size: 14px;
            color: var(--text-dim);
            font-weight: 400;
            letter-spacing: 0;
            text-transform: none;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            padding: 10px 20px;
            border: 1px solid var(--border-gold-dim);
            border-radius: 8px;
            background: var(--bg-cell);
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            background: #2a2a4a;
            border-color: var(--border-gold);
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, #b8860b, #daa520);
            color: #000;
            border-color: var(--border-gold);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #daa520, #ffd700);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .btn-danger {
            border-color: rgba(248, 113, 113, 0.4);
        }

        .btn-danger:hover {
            background: rgba(248, 113, 113, 0.15);
            border-color: var(--accent-red);
        }

        .btn-success {
            background: linear-gradient(135deg, #15803d, #22c55e);
            color: #fff;
            border-color: #22c55e;
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #166534, #4ade80);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
        }

        /* ── STATS BAR ── */
        .stats-bar {
            display: flex;
            gap: 24px;
            padding: 12px 32px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-label {
            color: var(--text-dim);
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            color: var(--accent-blue);
        }

        .stat-value.filled {
            color: var(--accent-green);
        }

        /* ── CONTROLS BAR ── */
        .controls-bar {
            display: flex;
            gap: 16px;
            padding: 14px 32px;
            background: rgba(22, 22, 37, 0.8);
            border-bottom: 1px solid var(--border);
            align-items: center;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-group label {
            font-size: 12px;
            color: var(--text-dim);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .control-input {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            padding: 6px 12px;
            background: var(--bg-cell);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        .control-input:focus {
            border-color: var(--border-gold);
        }

        select.control-input {
            cursor: pointer;
        }

        .toggle-btn {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-cell);
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            border-color: var(--border-gold);
            color: var(--text-gold);
            background: rgba(255, 215, 0, 0.08);
        }

        /* ── GRID CONTAINER ── */
        .grid-container {
            padding: 24px;
            overflow: auto;
            max-height: calc(100vh - 200px);
        }

        .tile-grid {
            display: grid;
            gap: 1px;
            background: var(--border);
            border: 2px solid var(--border-gold-dim);
            border-radius: 4px;
            width: fit-content;
        }

        /* ── TILE CELL ── */
        .tile-cell {
            background: var(--bg-cell);
            position: relative;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .tile-cell:hover {
            background: var(--bg-cell-hover);
            z-index: 10;
            box-shadow: 0 0 0 2px var(--border-gold);
        }

        .tile-cell.has-data {
            background: var(--bg-cell-filled);
            border-color: rgba(74, 222, 128, 0.3);
        }

        .tile-cell.has-data:hover {
            background: #1f3a1f;
        }

        .tile-cell .tile-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--text-dim);
            position: absolute;
            top: 2px;
            left: 3px;
            z-index: 2;
            pointer-events: none;
            line-height: 1;
        }

        .tile-cell.has-data .tile-id {
            color: var(--accent-green);
        }

        .tile-cell .tile-preview {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0.3;
        }

        .tile-cell.show-images .tile-preview {
            opacity: 1;
        }

        .tile-cell .tile-name-preview {
            font-size: 7px;
            color: var(--accent-green);
            position: absolute;
            bottom: 1px;
            left: 2px;
            right: 2px;
            text-align: center;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            z-index: 2;
            pointer-events: none;
            line-height: 1;
            font-weight: 600;
        }

        .tile-cell .tile-cost-preview {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--accent-blue);
            position: absolute;
            top: 2px;
            right: 3px;
            z-index: 2;
            pointer-events: none;
            line-height: 1;
            font-weight: 600;
        }

        /* ── EDIT MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border-gold-dim);
            border-radius: 16px;
            padding: 0;
            min-width: 420px;
            max-width: 520px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6), 0 0 40px rgba(255, 215, 0, 0.06);
            animation: modalIn 0.2s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }

        .modal-tile-preview {
            width: 64px;
            height: 64px;
            image-rendering: pixelated;
            border: 2px solid var(--border-gold);
            border-radius: 8px;
            background: var(--bg-dark);
        }

        .modal-tile-info h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-gold);
        }

        .modal-tile-info p {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .modal-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-dim);
        }

        .form-group input, .form-group select {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            padding: 10px 14px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--border-gold);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.08);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }

        .modal-footer {
            display: flex;
            justify-content: space-between;
            padding: 16px 24px;
            border-top: 1px solid var(--border);
        }

        .modal-footer .btn-group {
            display: flex;
            gap: 8px;
        }

        /* ── TERRAIN PRESETS ── */
        .preset-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 6px;
        }

        .preset-btn {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 500;
            padding: 6px 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-cell);
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }

        .preset-btn:hover {
            border-color: var(--border-gold);
            color: var(--text-gold);
            background: rgba(255, 215, 0, 0.08);
        }

        /* ── EXPORT PANEL ── */
        .export-panel {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .export-panel.show {
            display: flex;
        }

        .export-content {
            background: var(--bg-card);
            border: 1px solid var(--border-gold-dim);
            border-radius: 16px;
            padding: 24px;
            min-width: 600px;
            max-width: 800px;
            max-height: 80vh;
            overflow: auto;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
        }

        .export-content h2 {
            color: var(--text-gold);
            margin-bottom: 16px;
        }

        .export-textarea {
            width: 100%;
            min-height: 300px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--accent-green);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            padding: 16px;
            resize: vertical;
            outline: none;
        }

        .export-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            justify-content: flex-end;
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        /* ── LOADING ── */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 60vh;
            flex-direction: column;
            gap: 16px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--border-gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .nav-hint {
            font-size: 12px;
            color: var(--text-dim);
            padding: 2px 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 4px;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <h1>
            ⚔ TILESET EDITOR
            <span>— Plain.png (16×16 tiles)</span>
        </h1>
        <div class="header-actions">
            <span class="nav-hint">Click a tile to edit · Arrow keys to navigate</span>
            <button class="btn" onclick="clearAll()">Clear All</button>
            <button class="btn btn-primary" onclick="exportData()">📦 Export JSON</button>
        </div>
    </div>

    <!-- STATS BAR -->
    <div class="stats-bar">
        <div class="stat">
            <span class="stat-label">Total Tiles:</span>
            <span class="stat-value" id="totalTiles">—</span>
        </div>
        <div class="stat">
            <span class="stat-label">Configured:</span>
            <span class="stat-value filled" id="filledTiles">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">Grid:</span>
            <span class="stat-value" id="gridSize">—</span>
        </div>
        <div class="stat">
            <span class="stat-label">Hovered:</span>
            <span class="stat-value" id="hoveredId">—</span>
        </div>
    </div>

    <!-- CONTROLS BAR -->
    <div class="controls-bar">
        <div class="control-group">
            <label>Cell Size:</label>
            <select class="control-input" id="cellSizeSelect" onchange="changeCellSize()">
                <option value="24">24px (Tiny)</option>
                <option value="32">32px (Small)</option>
                <option value="48" selected>48px (Medium)</option>
                <option value="64">64px (Large)</option>
                <option value="96">96px (XL)</option>
            </select>
        </div>
        <button class="toggle-btn active" id="toggleImages" onclick="toggleImages()">🖼 Show Tile Images</button>
        <button class="toggle-btn" id="toggleIds" onclick="toggleIds()">🔢 Show IDs</button>
        <button class="toggle-btn active" id="toggleNames" onclick="toggleNames()">🏷 Show Names</button>
        <div class="control-group" style="margin-left: auto;">
            <label>Filter:</label>
            <select class="control-input" id="filterSelect" onchange="applyFilter()">
                <option value="all">All Tiles</option>
                <option value="configured">Configured Only</option>
                <option value="unconfigured">Unconfigured Only</option>
            </select>
        </div>
    </div>

    <!-- GRID -->
    <div class="grid-container" id="gridContainer">
        <div class="loading">
            <div class="loading-spinner"></div>
            <span style="color: var(--text-dim);">Loading tileset...</span>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <canvas class="modal-tile-preview" id="modalPreview" width="64" height="64"></canvas>
                <div class="modal-tile-info">
                    <h2>Tile #<span id="modalTileId">0</span></h2>
                    <p>Row <span id="modalRow">0</span>, Col <span id="modalCol">0</span></p>
                </div>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Terrain Type (Quick Pick)</label>
                    <div class="preset-grid" id="presetGrid"></div>
                </div>
                <div class="form-group">
                    <label>Name / Type</label>
                    <input type="text" id="inputName" placeholder="e.g. FOREST, CLIFF, SEA..." autocomplete="off">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Land Cost</label>
                        <input type="number" id="inputLandCost" value="1" min="-1" step="1">
                    </div>
                    <div class="form-group">
                        <label>Ocean Cost</label>
                        <input type="number" id="inputOceanCost" value="-1" min="-1" step="1">
                    </div>
                    <div class="form-group">
                        <label>Air Cost</label>
                        <input type="number" id="inputAirCost" value="1" min="-1" step="1">
                    </div>
                </div>
                <div class="form-row" style="grid-template-columns: 1fr 1fr;">
                    <div class="form-group">
                        <label>Def Bonus</label>
                        <input type="number" id="inputDef" value="0" min="0" step="1">
                    </div>
                    <div class="form-group">
                        <label>Avo Bonus</label>
                        <input type="number" id="inputAvo" value="0" min="0" step="1">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" onclick="clearTile()">Clear</button>
                <div class="btn-group">
                    <button class="btn" onclick="closeModal()">Cancel</button>
                    <button class="btn" onclick="saveTileAndPrev()">◀ Save & Prev</button>
                    <button class="btn btn-primary" onclick="saveTileAndNext()">Save & Next ▶</button>
                </div>
            </div>
        </div>
    </div>

    <!-- EXPORT PANEL -->
    <div class="export-panel" id="exportPanel">
        <div class="export-content">
            <h2>📦 Exported JSON — Plain.json</h2>
            <p style="color: var(--text-dim); margin-bottom: 12px;">Copy this JSON and provide it back so I can apply the data to your tileset.</p>
            <textarea class="export-textarea" id="exportTextarea" readonly></textarea>
            <div class="export-actions">
                <button class="btn" onclick="closeExport()">Close</button>
                <button class="btn btn-primary" onclick="copyExport()">📋 Copy to Clipboard</button>
            </div>
        </div>
    </div>

        const TILE_SIZE = 16;
        let cellSize = 48;
        let cols = 0, rows = 0, totalTiles = 0;
        let tileData = {}; // { id: { name, landCost, oceanCost, airCost, def, avo } }
        let currentEditId = null;
        let showImages = true;
        let showIds = false;
        let showNames = true;
        let tilesetImage = null;

        const TERRAIN_PRESETS = [
            { name: 'PLAIN',    land: 1,  ocean: -1, air: 1, def: 0, avo: 0 },
            { name: 'FOREST',   land: 2,  ocean: -1, air: 1, def: 1, avo: 15 },
            { name: 'MOUNTAIN', land: 3,  ocean: -1, air: 1, def: 2, avo: 20 },
            { name: 'PEAK',     land: -1, ocean: -1, air: 1, def: 3, avo: 25 },
            { name: 'RIVER',    land: 2,  ocean: -1, air: 1, def: 0, avo: 5 },
            { name: 'ROAD',     land: 1,  ocean: -1, air: 1, def: 0, avo: 0 },
            { name: 'BRIDGE',   land: 1,  ocean: 1,  air: 1, def: 0, avo: 0 },
            { name: 'SAND',     land: 2,  ocean: -1, air: 1, def: 0, avo: 5 },
            { name: 'SEA',      land: -1, ocean: 1,  air: 1, def: 0, avo: 10 },
            { name: 'CLIFF',    land: -1, ocean: -1, air: 1, def: 2, avo: 0 },
            { name: 'WALL',     land: -1, ocean: -1, air: -1, def: 3, avo: 0 },
            { name: 'FLOOR',    land: 1,  ocean: -1, air: 1, def: 0, avo: 0 },
            { name: 'FORT',     land: 1,  ocean: -1, air: 1, def: 2, avo: 15 },
            { name: 'GATE',     land: 1,  ocean: -1, air: 1, def: 2, avo: 10 },
            { name: 'HOUSE',    land: -1, ocean: -1, air: -1, def: 0, avo: 0 },
            { name: 'VILLAGE',  land: 1,  ocean: -1, air: 1, def: 1, avo: 10 },
            { name: 'THRONE',   land: 1,  ocean: -1, air: 1, def: 3, avo: 30 },
            { name: 'RUINS',    land: 1,  ocean: -1, air: 1, def: 1, avo: 5 },
            { name: 'LAKE',     land: -1, ocean: 1,  air: 1, def: 0, avo: 10 },
            { name: 'DESERT',   land: 2,  ocean: -1, air: 1, def: 0, avo: 5 },
            { name: 'THICKET',  land: 2,  ocean: -1, air: 1, def: 1, avo: 10 },
            { name: 'FLAT',     land: 1,  ocean: -1, air: 1, def: 0, avo: 0 },
        ];

        // ── LOAD IMAGE ──
        function loadTileset() {
            const img = new Image();
            img.onload = () => {
                tilesetImage = img;
                cols = Math.floor(img.width / TILE_SIZE);
                rows = Math.floor(img.height / TILE_SIZE);
                totalTiles = cols * rows;

                document.getElementById('totalTiles').textContent = totalTiles;
                document.getElementById('gridSize').textContent = `${cols}×${rows}`;

                // Load saved data from localStorage
                loadSavedData();
                buildGrid();
            };
            img.onerror = () => {
                document.getElementById('gridContainer').innerHTML = `
                    <div class="loading">
                        <p style="color: var(--accent-red);">❌ Failed to load Plain.png</p>
                        <p style="color: var(--text-dim); font-size: 13px;">Make sure to open this file from the project directory, or serve via a local server.</p>
                    </div>
                `;
            };
            img.src = TILESET_PATH;
        }

        // ── BUILD GRID ──
        function buildGrid() {
            const container = document.getElementById('gridContainer');
            const grid = document.createElement('div');
            grid.className = 'tile-grid';
            grid.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;
            grid.style.gridTemplateRows = `repeat(${rows}, ${cellSize}px)`;
            grid.id = 'tileGrid';

            for (let id = 0; id < totalTiles; id++) {
                const cell = document.createElement('div');
                cell.className = 'tile-cell' + (showImages ? ' show-images' : '');
                cell.dataset.id = id;
                cell.style.width = cellSize + 'px';
                cell.style.height = cellSize + 'px';

                // Tile preview canvas
                const canvas = document.createElement('canvas');
                canvas.className = 'tile-preview';
                canvas.width = TILE_SIZE;
                canvas.height = TILE_SIZE;
                const ctx = canvas.getContext('2d');
                const sx = (id % cols) * TILE_SIZE;
                const sy = Math.floor(id / cols) * TILE_SIZE;
                ctx.drawImage(tilesetImage, sx, sy, TILE_SIZE, TILE_SIZE, 0, 0, TILE_SIZE, TILE_SIZE);
                cell.appendChild(canvas);

                // ID label
                const idLabel = document.createElement('span');
                idLabel.className = 'tile-id';
                idLabel.textContent = id;
                idLabel.style.display = showIds ? 'block' : 'none';
                cell.appendChild(idLabel);

                // Name preview
                const nameLabel = document.createElement('span');
                nameLabel.className = 'tile-name-preview';
                nameLabel.style.display = showNames ? 'block' : 'none';
                cell.appendChild(nameLabel);

                // Cost preview
                const costLabel = document.createElement('span');
                costLabel.className = 'tile-cost-preview';
                cell.appendChild(costLabel);

                // Check if has data
                if (tileData[id]) {
                    cell.classList.add('has-data');
                    nameLabel.textContent = tileData[id].name;
                    costLabel.textContent = tileData[id].landCost;
                }

                cell.addEventListener('click', () => openModal(id));
                cell.addEventListener('mouseenter', () => {
                    document.getElementById('hoveredId').textContent = `#${id} (${id % cols}, ${Math.floor(id / cols)})`;
                });

                grid.appendChild(cell);
            }

            container.innerHTML = '';
            container.appendChild(grid);
            updateStats();
        }

        // ── MODAL ──
        function openModal(id) {
            currentEditId = id;
            const modal = document.getElementById('editModal');
            modal.classList.add('show');

            document.getElementById('modalTileId').textContent = id;
            document.getElementById('modalRow').textContent = Math.floor(id / cols);
            document.getElementById('modalCol').textContent = id % cols;

            // Draw preview
            const canvas = document.getElementById('modalPreview');
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            ctx.clearRect(0, 0, 64, 64);
            const sx = (id % cols) * TILE_SIZE;
            const sy = Math.floor(id / cols) * TILE_SIZE;
            ctx.drawImage(tilesetImage, sx, sy, TILE_SIZE, TILE_SIZE, 0, 0, 64, 64);

            // Fill form
            const data = tileData[id];
            document.getElementById('inputName').value = data ? data.name : '';
            document.getElementById('inputLandCost').value = data ? data.landCost : 1;
            document.getElementById('inputOceanCost').value = data ? data.oceanCost : -1;
            document.getElementById('inputAirCost').value = data ? data.airCost : 1;
            document.getElementById('inputDef').value = data ? data.def : 0;
            document.getElementById('inputAvo').value = data ? data.avo : 0;

            // Build presets
            const presetGrid = document.getElementById('presetGrid');
            presetGrid.innerHTML = '';
            TERRAIN_PRESETS.forEach(p => {
                const btn = document.createElement('button');
                btn.className = 'preset-btn';
                btn.textContent = p.name;
                btn.onclick = () => applyPreset(p);
                presetGrid.appendChild(btn);
            });

            setTimeout(() => document.getElementById('inputName').focus(), 100);
        }

        function applyPreset(preset) {
            document.getElementById('inputName').value = preset.name;
            document.getElementById('inputLandCost').value = preset.land;
            document.getElementById('inputOceanCost').value = preset.ocean;
            document.getElementById('inputAirCost').value = preset.air;
            document.getElementById('inputDef').value = preset.def;
            document.getElementById('inputAvo').value = preset.avo;
        }

        function saveTile() {
            const name = document.getElementById('inputName').value.trim();
            if (!name) {
                delete tileData[currentEditId];
            } else {
                tileData[currentEditId] = {
                    name: name,
                    landCost: parseInt(document.getElementById('inputLandCost').value) || 0,
                    oceanCost: parseInt(document.getElementById('inputOceanCost').value) || 0,
                    airCost: parseInt(document.getElementById('inputAirCost').value) || 0,
                    def: parseInt(document.getElementById('inputDef').value) || 0,
                    avo: parseInt(document.getElementById('inputAvo').value) || 0,
                };
            }
            updateCell(currentEditId);
            saveToLocalStorage();
            updateStats();
        }

        function saveTileAndNext() {
            saveTile();
            const nextId = currentEditId + 1;
            if (nextId < totalTiles) {
                openModal(nextId);
            } else {
                closeModal();
            }
        }

        function saveTileAndPrev() {
            saveTile();
            const prevId = currentEditId - 1;
            if (prevId >= 0) {
                openModal(prevId);
            } else {
                closeModal();
            }
        }

        function clearTile() {
            delete tileData[currentEditId];
            updateCell(currentEditId);
            saveToLocalStorage();
            updateStats();
            closeModal();
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('show');
            currentEditId = null;
        }

        function updateCell(id) {
            const cell = document.querySelector(`.tile-cell[data-id="${id}"]`);
            if (!cell) return;
            const data = tileData[id];
            const nameLabel = cell.querySelector('.tile-name-preview');
            const costLabel = cell.querySelector('.tile-cost-preview');

            if (data) {
                cell.classList.add('has-data');
                nameLabel.textContent = data.name;
                costLabel.textContent = data.landCost;
            } else {
                cell.classList.remove('has-data');
                nameLabel.textContent = '';
                costLabel.textContent = '';
            }
        }

        // ── TOGGLES ──
        function toggleImages() {
            showImages = !showImages;
            document.getElementById('toggleImages').classList.toggle('active', showImages);
            document.querySelectorAll('.tile-cell').forEach(c => c.classList.toggle('show-images', showImages));
        }

        function toggleIds() {
            showIds = !showIds;
            document.getElementById('toggleIds').classList.toggle('active', showIds);
            document.querySelectorAll('.tile-id').forEach(el => el.style.display = showIds ? 'block' : 'none');
        }

        function toggleNames() {
            showNames = !showNames;
            document.getElementById('toggleNames').classList.toggle('active', showNames);
            document.querySelectorAll('.tile-name-preview').forEach(el => el.style.display = showNames ? 'block' : 'none');
        }

        function changeCellSize() {
            cellSize = parseInt(document.getElementById('cellSizeSelect').value);
            buildGrid();
        }

        function applyFilter() {
            const filter = document.getElementById('filterSelect').value;
            document.querySelectorAll('.tile-cell').forEach(cell => {
                const id = parseInt(cell.dataset.id);
                const hasData = !!tileData[id];
                if (filter === 'all') cell.style.display = '';
                else if (filter === 'configured') cell.style.display = hasData ? '' : 'none';
                else if (filter === 'unconfigured') cell.style.display = hasData ? 'none' : '';
            });
        }

        // ── STATS ──
        function updateStats() {
            document.getElementById('filledTiles').textContent = Object.keys(tileData).length;
        }

        // ── EXPORT ──
        function exportData() {
            const result = { tiles: {} };
            const sortedIds = Object.keys(tileData).map(Number).sort((a, b) => a - b);
            
            for (const id of sortedIds) {
                const d = tileData[id];
                result.tiles[String(id)] = {
                    type: d.name,
                    def: d.def,
                    avo: d.avo,
                    costs: {
                        "Land Unit": d.landCost,
                        "Ocean Unit": d.oceanCost,
                        "Air Unit": d.airCost
                    }
                };
            }

            const json = JSON.stringify(result, null, 2);
            document.getElementById('exportTextarea').value = json;
            document.getElementById('exportPanel').classList.add('show');
        }

        function copyExport() {
            const textarea = document.getElementById('exportTextarea');
            textarea.select();
            document.execCommand('copy');
            const btn = event.target;
            btn.textContent = '✅ Copied!';
            setTimeout(() => btn.textContent = '📋 Copy to Clipboard', 1500);
        }

        function closeExport() {
            document.getElementById('exportPanel').classList.remove('show');
        }

        // ── CLEAR ──
        function clearAll() {
            if (!confirm('Clear all tile data? This cannot be undone.')) return;
            tileData = {};
            saveToLocalStorage();
            buildGrid();
        }

        // ── LOCAL STORAGE ──
        function saveToLocalStorage() {
            try {
                localStorage.setItem('tileset_editor_plain', JSON.stringify(tileData));
            } catch (e) {}
        }

        function loadSavedData() {
            try {
                const saved = localStorage.getItem('tileset_editor_plain');
                if (saved) {
                    tileData = JSON.parse(saved);
                }
            } catch (e) {}
        }

        // ── KEYBOARD ──
        document.addEventListener('keydown', (e) => {
            if (currentEditId === null) return;

            if (e.key === 'Escape') {
                closeModal();
                return;
            }

            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                saveTileAndNext();
                return;
            }
        });

        // Close modals on overlay click
        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('editModal')) closeModal();
        });
        document.getElementById('exportPanel').addEventListener('click', (e) => {
            if (e.target === document.getElementById('exportPanel')) closeExport();
        });

        // ── INIT ──
        loadTileset();
    </script>
</body>
</html>
